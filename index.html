<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>クリック・レストラン</title>
        <!-- CSSファイルを読み込む -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

    <!-- ゲーム全体を包むコンテナ（ここを2列に並べます） -->
    <div id="game-container">
        
        <!-- 左半分の部屋：クリックと情報 -->
        <div id="left-panel">
            <h1>売上: <span id="money">0</span> 円</h1>
            <p>毎秒の売上: <span id="mps">0</span> 円</p>

            <div id="click-area">
                <button id="main-click-btn">🍳 料理を作る！</button>
            </div>
        </div>


        <!-- 右半分の部屋：ショップ -->
        <div id="right-panel" style="position: relative;">
            <h2>スタッフ募集・設備投資</h2>

            <!-- 【追加】これがゼロ秒でパッと出る自作ポップアップの箱です -->
            <div id="tooltip" class="hidden"></div>

            <!-- JavaScriptがこの中にボタンを自動で量産します -->
            <div id="shop-area"></div>
        </div>

    </div>

    <!-- JavaScriptファイルを読み込む（ここはそのまま） -->
    <script src="script.js"></script>
</body>

</html>
