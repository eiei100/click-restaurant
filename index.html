<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>クリック・レストラン</title>
        <!-- CSSファイルを読み込む -->
        <link rel="stylesheet" href="style.css">
    </head>
<body>

    <!-- ゲーム全体を包むコンテナ（ここを3列に並べます） -->
    <div id="game-container">
        
        <!-- 1. 左列：クリックと売上情報 -->
        <div id="left-panel">
            <h1>売上: <span id="money">0</span> 円</h1>
            <p>毎秒の売上: <span id="mps">0</span> 円</p>
            <!-- 【追加】これまでに稼いだすべての合計金額を表示する場所 -->
            <p>通算の売上: <span id="total-money">0</span> 円</p>

            <div id="click-area">
                <button id="main-click-btn">🍳 料理を作る！</button>
            </div>
        </div>

        <!-- 2. 中央列：お店の発展・外観エリア -->
<div id="center-panel">
    <h2>マイ・レストラン</h2>

    <!-- 設定と転生ボタンのグループ -->
    <div id="menu-btn-group">
        <button id="setting-btn" class="menu-btn">⚙️ 設定</button>
        <button id="ascend-btn" class="menu-btn">🌌 転生</button>
    </div>
    <!-- 現在のお店のランク名を表示する場所 -->
    <div id="restaurant-rank">ランク1: 小さな屋台</div>

    <!-- 🎪 お客さんがトコトコ歩くアニメーションの舞台 -->
    <div id="restaurant-stage">
        <!-- 🏪 レストラン本体と、お金が浮かび上がる場所 -->
        <div id="restaurant-building-box">
            <div id="coin-effect"></div>
            <!-- 💡 修正：<img> タグに変更し、最初はランク1の画像をセットします -->
            <img id="restaurant-visual" src="img/restaurant/rank1.png" alt="お店の外観">
        </div>

        <img id="live-guest" class="walking-guest start-animation" src="img/guest/guest1.png" alt="客">
    </div>


</div>



        <!-- 3. 右列：ショップ -->
        <div id="right-panel" style="position: relative;">
            <h2>ショップ</h2>

            <!-- 🌟【新登場】ショップの切り替えタブ -->
            <div id ="shop-tabs">
                <button id="tab-facilities" class="tab-btn active">施設</button>
                <button id="tab-comfort" class="tab-btn">店舗設備</button>
            </div>
            <!-- 一括購入の倍率を切り替えるボタンのグループ -->
            <div id="buy-amount-selector" style="margin-bottom: 15px; text-align: left;">
                購入数:
                <label><input type="radio" name="buy-amount" value="1" checked> x1</label>
                <label><input type="radio" name="buy-amount" value="10"> x10</label>
                <label><input type="radio" name="buy-amount" value="100"> x100</label>
            </div>
            

            <!-- JavaScriptがこの中にボタンを自動で量産します -->
            <div id="shop-area-facilities" class="shop-continer"></div>
            <div id="shop-area-comfort" class="shop-continer hidden"></div>
        </div>

        <!-- ゼロ秒でパッと出る自作ポップアップの箱 -->
            <div id="tooltip" class="hidden"></div>
    </div>

    <!-- 【設定】設定画面のポップアップ（モーダル） -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>⚙️ 設定メニュー</h3>
            <p>ゲームの進行状況をすべて初期状態に戻します。</p>

            <!-- セーブデータの完全削除ボタン -->
            <button id="reset-game-btn" class="danger-btn">⚠️ セーブデータを削除する</button>
            <br>
            <button id="close-settings-btn" class="close-btn">閉じる</button>
        </div>
    </div>

<!-- 【転生】 転生画面のポップアップ（モーダル） -->
    <div id="ascend-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>🌌 転生（プレステージ）</h3>
            <p>現在のすべての売上と施設をリセットし、永久に売上がアップする「天界の調味料」を手に入れますか？</p>

            <!-- 【修正】styleを消して、クラス名（prestige-box）にしました -->
            <div class="prestige-box">
                現在の天界の調味料: <span id="current-chips">0</span>個<br>
                <!-- 【修正】styleを消して、クラス名（prestige-sub）にしました -->
                <span class="prestige-sub">今回の転生で獲得: +<span id="incoming-chips">0</span> 個</span>
                <p>※1個につき全体の売上・生産力が +1% アップします</p>
            </div>
            
            <button id="do-ascend-btn" class="action-btn" disabled>天界へ旅立つ</button>
            <br>
            <button id="close-ascend-btn" class="close-btn">戻る</button>
        </div>
    </div>

    <!-- JavaScriptファイルを読み込む -->
    <script src="script.js"></script>
</body>


</html>
